# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:

  resources:
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-IIS
      directives:
        description: Configure VM namingPrefixStage-IIS
      settings:
        Name: namingPrefixStage-IIS
        SwitchName: 'InternalNATSwitch'
        VhdPath: F:\Virtual Machines\namingPrefixStage-IIS.vhdx
        ProcessorCount: 2
        StartupMemory: '4GB'
        RestartIfNeeded: true
        State: Running
        Generation: 2
        Path: F:\Virtual Machines
        EnableGuestService: true
        SecureBoot: true
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-PG
      directives:
        description: Configure VM namingPrefixStage-PG
      settings:
        Name: namingPrefixStage-PG
        SwitchName: 'InternalNATSwitch'
        VhdPath: F:\Virtual Machines\namingPrefixStage-PG.vhdx
        ProcessorCount: 2
        StartupMemory: '4GB'
        RestartIfNeeded: true
        State: Running
        Generation: 2
        Path: F:\Virtual Machines
        EnableGuestService: true
        SecureBoot: false
  configurationVersion: 0.2.0
