# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:

  resources:
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-Ubuntu
      directives:
        description: Configure VM namingPrefixStage-Ubuntu
      settings:
        Name: namingPrefixStage-Ubuntu
        SwitchName: 'InternalNATSwitch'
        VhdPath: F:\Virtual Machines\namingPrefixStage-Ubuntu.vhdx
        ProcessorCount: 2
        StartupMemory: '4GB'
        RestartIfNeeded: true
        State: Running
        Generation: 2
        Path: F:\Virtual Machines
        EnableGuestService: true
        SecureBoot: false
  configurationVersion: 0.2.0