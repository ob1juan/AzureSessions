# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:

  resources:
    - resource: HyperVDsc/VMHyperV
      id: namingPrefixStage-pgsql
      directives:
        description: Configure VM namingPrefixStage-pgsql
      settings:
        Name: namingPrefixStage-pgsql
        SwitchName: 'InternalNATSwitch'
        VhdPath: F:\Virtual Machines\namingPrefixStage-pgsql.vhdx
        ProcessorCount: 2
        StartupMemory: '4GB'
        RestartIfNeeded: true
        State: Running
        Generation: 1
        Path: F:\Virtual Machines
        EnableGuestService: true
  configurationVersion: 0.2.0